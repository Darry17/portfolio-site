<!-- src/app/work/work.component.html -->
<section id="work">
  <div class="work-header">
    <div class="work-header-left">
      <span class="section-label">Work</span>
    </div>
    <h2 class="work-headline reveal" appReveal>Selected Projects</h2>
    <div class="work-count reveal" appReveal>03 — Work</div>
  </div>
  <div class="projects-list">
    @for (project of projects; track project.num; let i = $index) {
      <div
        class="project-row reveal"
        appReveal
        [appRevealDelay]="i * 80"
        appRevealDirection="up"
      >
        <div class="project-num">{{ project.num }}</div>
        <div class="project-name">
          <span class="project-name-inner">{{ project.name }}</span>
        </div>
        <div class="project-type">{{ project.type }}</div>
        <div class="project-year">{{ project.year }}</div>
        <div class="project-arrow">↗</div>
        <div class="project-desc">{{ project.description }}</div>
      </div>
    }
  </div>
</section>
