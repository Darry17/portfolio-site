<section id="skills">
  <div class="skills-label-col">
    <span class="section-label">Skills</span>
  </div>
  <div class="skills-content">
    <div class="skills-header">
      <div class="section-number reveal" appReveal [appRevealDelay]="0" appRevealDirection="fade">02 — Skills</div>
      <h2 class="skills-headline reveal" appReveal [appRevealDelay]="100" appRevealDirection="up">Capabilities</h2>
    </div>
    <div class="skills-grid">
      @for (category of categories; track category.label; let ci = $index) {
        <div class="skill-category reveal" appReveal [appRevealDelay]="ci * 120" appRevealDirection="up">
          <div class="skill-cat-label">{{ category.label }}</div>
          @for (skill of category.skills; track skill.name; let si = $index) {
            <div class="skill-item">
              <span class="skill-name">{{ skill.name }}</span>
              <div class="skill-bar-wrap">
                <div
                  #skillBar
                  class="skill-bar"
                  [attr.data-width]="skill.width"
                ></div>
              </div>
            </div>
          }
        </div>
      }
    </div>
  </div>
</section>
